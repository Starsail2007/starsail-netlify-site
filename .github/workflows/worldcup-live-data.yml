name: World Cup live data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a data refresh even when the schedule says to wait"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: worldcup-live-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Generate data when due
        id: update
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_LEAGUE_ID: ${{ vars.FOOTBALL_LEAGUE_ID || '1' }}
          FOOTBALL_SEASON: ${{ vars.FOOTBALL_SEASON || '2026' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_SCORE_MODEL: ${{ vars.OPENAI_SCORE_MODEL || vars.OPENAI_SCHEDULE_MODEL || 'gpt-5.5' }}
          WORLD_CUP_CURRENT_DATA_URL: https://raw.githubusercontent.com/${{ github.repository }}/worldcup-data/public/data/worldcup-live.json
          WORLD_CUP_FORCE_UPDATE: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/worldcup-live.json"
          node scripts/worldcup/update-live-data.mjs --output "$output" --current-url "$WORLD_CUP_CURRENT_DATA_URL"
          if [ -f "$output" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish data branch
        if: steps.update.outputs.updated == 'true'
        run: |
          set -euo pipefail
          data_file="$RUNNER_TEMP/worldcup-live.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin worldcup-data || true
          if git show-ref --verify --quiet refs/remotes/origin/worldcup-data; then
            git switch --force-create worldcup-data origin/worldcup-data
          else
            git switch --orphan worldcup-data
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p public/data
          cp "$data_file" public/data/worldcup-live.json
          git add public/data/worldcup-live.json

          if git diff --cached --quiet; then
            echo "World Cup data is unchanged."
            exit 0
          fi

          git commit -m "Update World Cup live data"
          git push origin worldcup-data
