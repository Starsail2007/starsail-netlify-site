<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>舞萌 DX 迪拉熊图片素材库</title>
    <style>
      :root {
        color-scheme: dark;
        background: #101318;
        color: #f6f8fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 28px;
        background: #101318;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 16px;
      }

      figure {
        margin: 0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #181d24;
      }

      .image-box {
        display: grid;
        min-height: 220px;
        place-items: center;
        padding: 16px;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.045) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(255, 255, 255, 0.045) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.045) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.045) 75%);
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0;
        background-size: 20px 20px;
      }

      img {
        display: block;
        max-width: 100%;
        max-height: 420px;
        object-fit: contain;
      }

      figcaption {
        padding: 10px 12px 12px;
        color: #c9d2de;
        font-size: 12px;
        line-height: 1.35;
        word-break: break-word;
      }

      @media (max-width: 640px) {
        body {
          padding: 18px;
        }

        .gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>舞萌 DX 迪拉熊图片素材库</h1>
    <main class="gallery">
      <figure>
        <div class="image-box"><img src="images/13-clean-front-fullbody.png" alt="clean front full body" /></div>
        <figcaption>13-clean-front-fullbody.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/03-official-base-icon.png" alt="official base icon" /></div>
        <figcaption>03-official-base-icon.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/01-official-profile-main.png" alt="official profile main" /></div>
        <figcaption>01-official-profile-main.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/04-official-theme-jacket.jpg" alt="official theme jacket" /></div>
        <figcaption>04-official-theme-jacket.jpg</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/05-official-splash-icon.png" alt="official splash icon" /></div>
        <figcaption>05-official-splash-icon.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/06-official-splash-dx-pass.png" alt="official splash DX pass" /></div>
        <figcaption>06-official-splash-dx-pass.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/02-official-splash-family.png" alt="official splash family" /></div>
        <figcaption>02-official-splash-family.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/07-official-limekkuma-icon.png" alt="official limekkuma icon" /></div>
        <figcaption>07-official-limekkuma-icon.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/08-official-lemonkkuma-icon.png" alt="official lemonkkuma icon" /></div>
        <figcaption>08-official-lemonkkuma-icon.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/09-official-yetikkuma-icon.png" alt="official yetikkuma icon" /></div>
        <figcaption>09-official-yetikkuma-icon.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/10-official-risukkuma-icon.png" alt="official risukkuma icon" /></div>
        <figcaption>10-official-risukkuma-icon.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/11-official-pandakuma-icon.png" alt="official pandakuma icon" /></div>
        <figcaption>11-official-pandakuma-icon.png</figcaption>
      </figure>
      <figure>
        <div class="image-box"><img src="images/12-official-mitsuyoshikkuma-icon.png" alt="official mitsuyoshikkuma icon" /></div>
        <figcaption>12-official-mitsuyoshikkuma-icon.png</figcaption>
      </figure>
    </main>
  </body>
</html>
